<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="short icon" href="image/logo_nueve2.png">
    <link rel="stylesheet" href="paiement.css">
</head>
<body>

<div class="container">

    <form action="reussite.html">

        <div class="row">

            <div class="col">

                <h3 class="title">Adresse de facturation</h3>

                <div class="inputBox">
                    <span>Nom complet :</span>
                    <input type="text" placeholder="Nuevefood" required>
                </div>
                <div class="inputBox">
                    <span>email :</span>
                    <input type="email" placeholder="fastfood@example.com" required>
                </div>
                <div class="inputBox">
                    <span>addresse :</span>
                    <input type="text" placeholder="avenue - quartier - commune" required>
                </div>
                <div class="inputBox">
                    <span>Ville :</span>
                    <input type="text" placeholder="Lubumbashi" required>
                </div>

                <div class="flex">
                    <div class="inputBox">
                        <span>Pays :</span>
                        <input type="text" placeholder="Congo" required>
                    </div>
                    <div class="inputBox">
                        <span>Code  postal :</span>
                        <input type="text" placeholder="" >
                    </div>
                </div>

            </div>

            <div class="col">

                <h3 class="title">Paiement</h3>

                <div class="inputBox">
                    <span>cards accepted :</span>
                    <img src="image/card_img.png" alt="">
                </div>
                <div class="inputBox">
                    <span>Nom de la carte :</span>
                    <input type="text" placeholder="mr. kadiat" required>
                </div>
                <div class="inputBox">
                    <span>Numero de la carte :</span>
                    <input type="text" placeholder="1111-2222-3333-4444" required>
                </div>
                <div class="inputBox">
                    <span>Exp mois:</span>
                    <input type="date" placeholder="Fevrier" required>
                </div>

                <div class="flex">
                    <div class="inputBox">
                        <span>Exp annee:</span>
                        <input type="date" placeholder="2026" required>
                    </div>
                    <div class="inputBox">
                        <span>CVV :</span>
                        <input type="text" placeholder="1234" required>
                    </div>
                </div>

            </div>
    
        </div>

        <input type="submit" value="Verification" class="submit-btn">

    </form>

</div>    
    
</body>
</html>
